apis:
  - aid: paypal:paypal-billing-subscriptions-api
    name: Paypal Billing Subscriptions API
    tags:
      - Billing
      - Plans
      - Activate
      - Deactivate
      - Pricing
      - Schemes
      - Subscriptions
      - Revise
      - Suspend
      - Cancel
