aid: paypal
name: PayPal
description: PayPal is a global online payment system that lets individuals and businesses
  send and receive money electronically. PayPal exposes a broad surface of REST APIs
  covering payments, orders, subscriptions, invoicing, payouts, disputes, payment
  tokens, shipping tracking, transaction reporting, partner referrals, payment experience,
  and webhook notifications.
kind: contract
position: Consuming
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
