- aid: paypal:paypal-payments-api
  name: PayPal Payments API
  description: The PayPal Payments API lets businesses authorize, capture, refund,
    void, and reauthorize payments, supporting credit and debit cards as well as PayPal
    and Venmo wallets.
  humanURL: https://developer.paypal.com/api/rest/
  tags:
  - Authorizations
  - Captures
  - Payments
  - Refunds
  properties:
  - type: Documentation
    url: https://developer.paypal.com/api/rest/
  - type: OpenAPI
    url: openapi/paypal-payments-openapi-original.yml
- aid: paypal:paypal-payouts-api
  name: PayPal Payouts API
  description: The PayPal Payouts API lets businesses send mass payments to multiple
    recipients with a single API call, useful for marketplaces, affiliates, rewards
    programs, and contractor payouts.
  humanURL: https://developer.paypal.com/docs/api/payments.payouts-batch/v1/
  tags:
  - Mass Pay
  - Payouts
