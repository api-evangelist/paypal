  name: PayPal Billing Subscriptions API
  description: The PayPal Billing Subscriptions API enables businesses to create and
    manage subscription plans, activate, suspend, cancel, capture, and revise customer
    subscriptions, and track recurring payments.
  humanURL: https://developer.paypal.com/docs/api/subscriptions/v1/
