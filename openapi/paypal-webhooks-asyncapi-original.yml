asyncapi: '2.6.0'
id: 'urn:com:paypal:webhooks'
info:
  title: PayPal Webhooks
  version: '1.0.0'
  description: |
    AsyncAPI 2.6 description of PayPal's webhook event surface. PayPal delivers
    signed HTTP POST callbacks to merchant-configured listener URLs whenever a
    subscribed event occurs on a PayPal account (orders, captures, refunds,
    subscriptions, invoices, disputes, payouts, vault tokens, merchant
    onboarding, and more).

    Every notification arrives with the same envelope (id, event_version,
    create_time, resource_type, resource_version, event_type, summary,
    resource, links) and is accompanied by a set of PAYPAL-TRANSMISSION-*
    HTTP headers that listeners use to verify authenticity via PayPal's
    `/v1/notifications/verify-webhook-signature` endpoint or by manually
    validating the signature against PayPal's published X.509 certificate.

    Event names and payload envelope fields are sourced from
    https://developer.paypal.com/api/rest/webhooks/event-names/ and the
    PayPal Notification Webhooks OpenAPI definition.
  contact:
    name: PayPal Developer
    url: https://developer.paypal.com/api/rest/webhooks/
  license:
    name: Proprietary - PayPal Developer Agreement
    url: https://www.paypal.com/us/legalhub/paypal/useragreement-full
  termsOfService: https://www.paypal.com/us/legalhub/useragreement-full
defaultContentType: application/json
servers:
  listener:
    url: '{listenerUrl}'
    protocol: https
    description: |
      Merchant-operated HTTPS listener URL registered when creating a webhook
      via POST /v1/notifications/webhooks. PayPal posts each notification to
      this URL.
    variables:
      listenerUrl:
        default: https://example.com/paypal/webhook
        description: The fully-qualified HTTPS URL of the merchant's webhook listener.
channels:
  paypal/webhook:
    description: |
      The single logical channel that receives every PayPal webhook
      notification. The concrete event is identified by the `event_type`
      field on the envelope (one of the documented event names enumerated
      in `components.schemas.EventType`).
    bindings:
      http:
        type: request
        method: POST
        bindingVersion: '0.3.0'
    subscribe:
      operationId: receiveWebhookEvent
      summary: Receive a PayPal webhook event notification.
      description: |
        PayPal POSTs a JSON envelope to the registered listener URL. The
        listener must respond with a 2xx status code within a short window
        or PayPal will retry delivery. Listeners must verify authenticity
        using the PAYPAL-TRANSMISSION-* headers before processing the
        payload.
      bindings:
        http:
          bindingVersion: '0.3.0'
      message:
        oneOf:
          - $ref: '#/components/messages/CheckoutOrderApproved'
          - $ref: '#/components/messages/CheckoutOrderCompleted'
          - $ref: '#/components/messages/CheckoutOrderProcessed'
          - $ref: '#/components/messages/CheckoutPaymentApprovalReversed'
          - $ref: '#/components/messages/CheckoutCheckoutBuyerApproved'
          - $ref: '#/components/messages/PaymentAuthorizationCreated'
          - $ref: '#/components/messages/PaymentAuthorizationVoided'
          - $ref: '#/components/messages/PaymentCaptureCompleted'
          - $ref: '#/components/messages/PaymentCaptureDeclined'
          - $ref: '#/components/messages/PaymentCaptureDenied'
          - $ref: '#/components/messages/PaymentCapturePending'
          - $ref: '#/components/messages/PaymentCaptureRefunded'
          - $ref: '#/components/messages/PaymentCaptureReversed'
          - $ref: '#/components/messages/PaymentRefundPending'
          - $ref: '#/components/messages/PaymentRefundFailed'
          - $ref: '#/components/messages/PaymentSaleCompleted'
          - $ref: '#/components/messages/PaymentSaleDenied'
          - $ref: '#/components/messages/PaymentSalePending'
          - $ref: '#/components/messages/PaymentSaleRefunded'
          - $ref: '#/components/messages/PaymentSaleReversed'
          - $ref: '#/components/messages/PaymentOrderCreated'
          - $ref: '#/components/messages/PaymentOrderCancelled'
          - $ref: '#/components/messages/PaymentsPaymentCreated'
          - $ref: '#/components/messages/PaymentPayoutsBatchDenied'
          - $ref: '#/components/messages/PaymentPayoutsBatchProcessing'
          - $ref: '#/components/messages/PaymentPayoutsBatchSuccess'
          - $ref: '#/components/messages/PaymentPayoutsItemBlocked'
          - $ref: '#/components/messages/PaymentPayoutsItemCanceled'
          - $ref: '#/components/messages/PaymentPayoutsItemFailed'
          - $ref: '#/components/messages/PaymentPayoutsItemHeld'
          - $ref: '#/components/messages/PaymentPayoutsItemRefunded'
          - $ref: '#/components/messages/PaymentPayoutsItemReturned'
          - $ref: '#/components/messages/PaymentPayoutsItemSucceeded'
          - $ref: '#/components/messages/PaymentPayoutsItemUnclaimed'
          - $ref: '#/components/messages/PaymentReferencedPayoutItemCompleted'
          - $ref: '#/components/messages/PaymentReferencedPayoutItemFailed'
          - $ref: '#/components/messages/BillingPlanCreated'
          - $ref: '#/components/messages/BillingPlanUpdated'
          - $ref: '#/components/messages/BillingPlanActivated'
          - $ref: '#/components/messages/BillingPlanDeactivated'
          - $ref: '#/components/messages/BillingPlanPricingChangeActivated'
          - $ref: '#/components/messages/BillingSubscriptionCreated'
          - $ref: '#/components/messages/BillingSubscriptionActivated'
          - $ref: '#/components/messages/BillingSubscriptionUpdated'
          - $ref: '#/components/messages/BillingSubscriptionExpired'
          - $ref: '#/components/messages/BillingSubscriptionCancelled'
          - $ref: '#/components/messages/BillingSubscriptionSuspended'
          - $ref: '#/components/messages/BillingSubscriptionReActivated'
          - $ref: '#/components/messages/BillingSubscriptionPaymentFailed'
          - $ref: '#/components/messages/CatalogProductCreated'
          - $ref: '#/components/messages/CatalogProductUpdated'
          - $ref: '#/components/messages/CustomerDisputeCreated'
          - $ref: '#/components/messages/CustomerDisputeResolved'
