  schemas:
    TransmissionHeaders:
      type: object
      description: |
        Set of HTTP request headers PayPal sends with every webhook notification.
        Used by listeners to verify authenticity either by calling
        POST /v1/notifications/verify-webhook-signature or by validating the
        signature directly against PayPal's X.509 certificate.
      properties:
        PAYPAL-TRANSMISSION-ID:
          type: string
          description: The unique ID of the HTTP transmission. Maps to `transmission_id` in the verify-webhook-signature request.
        PAYPAL-TRANSMISSION-TIME:
          type: string
          format: date-time
          description: The date and time when the message was transmitted, in RFC 3339 format. Maps to `transmission_time`.
        PAYPAL-TRANSMISSION-SIG:
          type: string
          description: The PayPal-generated asymmetric signature (base64). Maps to `transmission_sig`.
        PAYPAL-CERT-URL:
          type: string
          format: uri
          description: The URL of the X.509 public key certificate used to verify the signature. Maps to `cert_url`.
        PAYPAL-AUTH-ALGO:
          type: string
          description: The algorithm PayPal uses to generate the signature (for example, `SHA256withRSA`). Maps to `auth_algo`.
        PAYPAL-AUTH-VERSION:
          type: string
          description: The version of the PayPal authentication algorithm used to sign the payload.
        Correlation-Id:
          type: string
          description: PayPal-internal request correlation identifier helpful for support investigations.
      required:
        - PAYPAL-TRANSMISSION-ID
        - PAYPAL-TRANSMISSION-TIME
        - PAYPAL-TRANSMISSION-SIG
        - PAYPAL-CERT-URL
        - PAYPAL-AUTH-ALGO
    Event:
      type: object
      description: |
        The standard PayPal webhook event envelope. Every notification posted to
        a listener URL is shaped like this, with the concrete event variant
        identified by `event_type`. Fields mirror the `event` schema in the
        PayPal Notification Webhooks OpenAPI definition.
      properties:
        id:
          type: string
          description: The ID of the webhook event notification.
        create_time:
          type: string
          format: date-time
          description: The date and time when the webhook event notification was created, in RFC 3339 format.
        resource_type:
          type: string
          description: The name of the resource related to the webhook notification event (for example, `capture`, `subscription`, `invoice`, `dispute`).
        event_version:
          type: string
          description: The event version in the webhook notification.
          pattern: "^([0-9]+\\.[0-9]+)$"
        resource_version:
          type: string
          description: The version of the embedded resource.
          pattern: "^([0-9]+\\.[0-9]+)$"
        event_type:
          $ref: '#/components/schemas/EventType'
        summary:
          type: string
          description: A summary description for the event notification.
        resource:
          type: object
          description: The resource that triggered the webhook event notification. Shape depends on `resource_type` and on the API that owns the resource (Orders, Payments, Subscriptions, Invoicing, Disputes, Payouts, Vault, etc.).
          additionalProperties: true
        links:
          type: array
          description: HATEOAS links for the event notification (for example, `self` and `resend`).
          items:
            $ref: '#/components/schemas/Link'
      required:
        - id
        - create_time
        - event_type
        - resource_type
        - resource
    Link:
      type: object
      description: A HATEOAS link description.
      properties:
        href:
          type: string
          format: uri
        rel:
          type: string
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - HEAD
            - OPTIONS
            - CONNECT
            - TRACE
      required:
        - href
        - rel
    EventType:
      type: string
      description: |
        Enumeration of documented PayPal webhook event names. Sourced verbatim
        from https://developer.paypal.com/api/rest/webhooks/event-names/.
      enum:
        - CHECKOUT.ORDER.APPROVED
        - CHECKOUT.ORDER.COMPLETED
        - CHECKOUT.ORDER.PROCESSED
        - CHECKOUT.PAYMENT-APPROVAL.REVERSED
        - CHECKOUT.CHECKOUT.BUYER-APPROVED
        - PAYMENT.AUTHORIZATION.CREATED
        - PAYMENT.AUTHORIZATION.VOIDED
        - PAYMENT.CAPTURE.COMPLETED
        - PAYMENT.CAPTURE.DECLINED
        - PAYMENT.CAPTURE.DENIED
        - PAYMENT.CAPTURE.PENDING
        - PAYMENT.CAPTURE.REFUNDED
        - PAYMENT.CAPTURE.REVERSED
        - PAYMENT.REFUND.PENDING
        - PAYMENT.REFUND.FAILED
        - PAYMENT.SALE.COMPLETED
        - PAYMENT.SALE.DENIED
        - PAYMENT.SALE.PENDING
        - PAYMENT.SALE.REFUNDED
        - PAYMENT.SALE.REVERSED
        - PAYMENT.ORDER.CREATED
        - PAYMENT.ORDER.CANCELLED
        - PAYMENTS.PAYMENT.CREATED
        - PAYMENT.PAYOUTSBATCH.DENIED
        - PAYMENT.PAYOUTSBATCH.PROCESSING
        - PAYMENT.PAYOUTSBATCH.SUCCESS
        - PAYMENT.PAYOUTS-ITEM.BLOCKED
        - PAYMENT.PAYOUTS-ITEM.CANCELED
        - PAYMENT.PAYOUTS-ITEM.FAILED
        - PAYMENT.PAYOUTS-ITEM.HELD
        - PAYMENT.PAYOUTS-ITEM.REFUNDED
        - PAYMENT.PAYOUTS-ITEM.RETURNED
        - PAYMENT.PAYOUTS-ITEM.SUCCEEDED
        - PAYMENT.PAYOUTS-ITEM.UNCLAIMED
        - PAYMENT.REFERENCED-PAYOUT-ITEM.COMPLETED
        - PAYMENT.REFERENCED-PAYOUT-ITEM.FAILED
        - BILLING.PLAN.CREATED
        - BILLING.PLAN.UPDATED
        - BILLING.PLAN.ACTIVATED
        - BILLING.PLAN.DEACTIVATED
        - BILLING.PLAN.PRICING-CHANGE.ACTIVATED
        - BILLING.SUBSCRIPTION.CREATED
        - BILLING.SUBSCRIPTION.ACTIVATED
        - BILLING.SUBSCRIPTION.UPDATED
        - BILLING.SUBSCRIPTION.EXPIRED
        - BILLING.SUBSCRIPTION.CANCELLED
        - BILLING.SUBSCRIPTION.SUSPENDED
        - BILLING.SUBSCRIPTION.RE-ACTIVATED
        - BILLING.SUBSCRIPTION.PAYMENT.FAILED
        - CATALOG.PRODUCT.CREATED
        - CATALOG.PRODUCT.UPDATED
        - CUSTOMER.DISPUTE.CREATED
        - CUSTOMER.DISPUTE.RESOLVED
        - CUSTOMER.DISPUTE.UPDATED
        - RISK.DISPUTE.CREATED
        - INVOICING.INVOICE.CANCELLED
        - INVOICING.INVOICE.CREATED
        - INVOICING.INVOICE.PAID
        - INVOICING.INVOICE.REFUNDED
        - INVOICING.INVOICE.SCHEDULED
        - INVOICING.INVOICE.UPDATED
        - IDENTITY.AUTHORIZATION-CONSENT.REVOKED
        - MERCHANT.ONBOARDING.COMPLETED
        - MERCHANT.PARTNER-CONSENT.REVOKED
        - CUSTOMER.ACCOUNT-LIMITATION.ADDED
        - CUSTOMER.ACCOUNT-LIMITATION.ESCALATED
        - CUSTOMER.ACCOUNT-LIMITATION.LIFTED
        - CUSTOMER.ACCOUNT-LIMITATION.UPDATED
        - CUSTOMER.MERCHANT-INTEGRATION.CAPABILITY-UPDATED
