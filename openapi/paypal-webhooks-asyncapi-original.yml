          - $ref: '#/components/messages/CustomerAccountLimitationLifted'
          - $ref: '#/components/messages/CustomerAccountLimitationUpdated'
          - $ref: '#/components/messages/CustomerMerchantIntegrationCapabilityUpdated'
          - $ref: '#/components/messages/CustomerMerchantIntegrationProductSubscriptionUpdated'
          - $ref: '#/components/messages/CustomerMerchantIntegrationSellerAlreadyIntegrated'
          - $ref: '#/components/messages/CustomerMerchantIntegrationSellerOnboardingInitiated'
          - $ref: '#/components/messages/CustomerMerchantIntegrationSellerConsentGranted'
          - $ref: '#/components/messages/CustomerMerchantIntegrationSellerEmailConfirmed'
          - $ref: '#/components/messages/CustomerManagedAccountAccountCreated'
          - $ref: '#/components/messages/CustomerManagedAccountCreationFailed'
          - $ref: '#/components/messages/CustomerManagedAccountAccountUpdated'
          - $ref: '#/components/messages/CustomerManagedAccountAccountStatusChanged'
          - $ref: '#/components/messages/CustomerManagedAccountRiskAssessed'
          - $ref: '#/components/messages/CustomerManagedAccountNegativeBalanceNotified'
          - $ref: '#/components/messages/CustomerManagedAccountNegativeBalanceDebitInitiated'
          - $ref: '#/components/messages/VaultPaymentTokenCreated'
          - $ref: '#/components/messages/VaultPaymentTokenDeleted'
          - $ref: '#/components/messages/VaultPaymentTokenDeletionInitiated'
