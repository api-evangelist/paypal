naftiko: 1.0.0-alpha2
info:
  label: Paypal Shipment Tracking — Trackers-Batch
  description: 'Paypal Shipment Tracking — Trackers-Batch. 1 operations. Lead operation: Add tracking information for multiple
    PayPal transactions. Self-contained Naftiko capability covering one Paypal business surface.'
  tags:
  - Paypal
  - Trackers-Batch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAYPAL_API_KEY: PAYPAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: shipping-tracking-trackers-batch
    baseUri: https://api-m.sandbox.paypal.com
    description: Paypal Shipment Tracking — Trackers-Batch business capability. Self-contained, no shared references.
    resources:
    - name: v1-shipping-trackers-batch
      path: /v1/shipping/trackers-batch
      operations:
      - name: trackersbatchpost
        method: POST
        description: Add tracking information for multiple PayPal transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PAYPAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: shipping-tracking-trackers-batch-rest
    port: 8080
    description: REST adapter for Paypal Shipment Tracking — Trackers-Batch. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/shipping/trackers-batch
      name: v1-shipping-trackers-batch
      description: REST surface for v1-shipping-trackers-batch.
      operations:
      - method: POST
        name: trackersbatchpost
        description: Add tracking information for multiple PayPal transactions
        call: shipping-tracking-trackers-batch.trackersbatchpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shipping-tracking-trackers-batch-mcp
    port: 9090
    transport: http
    description: MCP adapter for Paypal Shipment Tracking — Trackers-Batch. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: add-tracking-information-multiple-paypal
      description: Add tracking information for multiple PayPal transactions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shipping-tracking-trackers-batch.trackersbatchpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
