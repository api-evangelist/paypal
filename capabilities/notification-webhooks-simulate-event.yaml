naftiko: 1.0.0-alpha2
info:
  label: Paypal Webhooks Management — Simulate-Event
  description: 'Paypal Webhooks Management — Simulate-Event. 1 operations. Lead operation: Paypal Simulate webhook event.
    Self-contained Naftiko capability covering one Paypal business surface.'
  tags:
  - Paypal
  - Simulate-Event
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAYPAL_API_KEY: PAYPAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: notification-webhooks-simulate-event
    baseUri: https://api-m.sandbox.paypal.com
    description: Paypal Webhooks Management — Simulate-Event business capability. Self-contained, no shared references.
    resources:
    - name: v1-notifications-simulate-event
      path: /v1/notifications/simulate-event
      operations:
      - name: simulateeventpost
        method: POST
        description: Paypal Simulate webhook event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PAYPAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: notification-webhooks-simulate-event-rest
    port: 8080
    description: REST adapter for Paypal Webhooks Management — Simulate-Event. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/notifications/simulate-event
      name: v1-notifications-simulate-event
      description: REST surface for v1-notifications-simulate-event.
      operations:
      - method: POST
        name: simulateeventpost
        description: Paypal Simulate webhook event
        call: notification-webhooks-simulate-event.simulateeventpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: notification-webhooks-simulate-event-mcp
    port: 9090
    transport: http
    description: MCP adapter for Paypal Webhooks Management — Simulate-Event. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: paypal-simulate-webhook-event
      description: Paypal Simulate webhook event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: notification-webhooks-simulate-event.simulateeventpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
