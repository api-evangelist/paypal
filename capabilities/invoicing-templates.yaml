    resources:
    - name: v2-invoicing-templates
      path: /v2/invoicing/templates
      operations:
      - name: templateslist
        method: GET
        description: Paypal List templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: templatescreate
