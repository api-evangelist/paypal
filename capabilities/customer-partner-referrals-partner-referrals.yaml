naftiko: 1.0.0-alpha2
info:
  label: Paypal Partner Referrals — Partner-Referrals
  description: 'Paypal Partner Referrals — Partner-Referrals. 2 operations. Lead operation: Paypal Create partner referral.
    Self-contained Naftiko capability covering one Paypal business surface.'
  tags:
  - Paypal
  - Partner-Referrals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAYPAL_API_KEY: PAYPAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: customer-partner-referrals-partner-referrals
    baseUri: https://api-m.sandbox.paypal.com
    description: Paypal Partner Referrals — Partner-Referrals business capability. Self-contained, no shared references.
    resources:
    - name: v2-customer-partner-referrals
      path: /v2/customer/partner-referrals
      operations:
      - name: partnerreferralscreate
        method: POST
        description: Paypal Create partner referral
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-customer-partner-referrals-partner_referral_id
      path: /v2/customer/partner-referrals/{partner_referral_id}
      operations:
      - name: partnerreferralsread
        method: GET
        description: Paypal Show referral data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PAYPAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: customer-partner-referrals-partner-referrals-rest
    port: 8080
    description: REST adapter for Paypal Partner Referrals — Partner-Referrals. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2/customer/partner-referrals
      name: v2-customer-partner-referrals
      description: REST surface for v2-customer-partner-referrals.
      operations:
      - method: POST
        name: partnerreferralscreate
        description: Paypal Create partner referral
        call: customer-partner-referrals-partner-referrals.partnerreferralscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/customer/partner-referrals/{partner-referral-id}
      name: v2-customer-partner-referrals-partner-referral-id
      description: REST surface for v2-customer-partner-referrals-partner_referral_id.
      operations:
      - method: GET
        name: partnerreferralsread
        description: Paypal Show referral data
        call: customer-partner-referrals-partner-referrals.partnerreferralsread
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: customer-partner-referrals-partner-referrals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Paypal Partner Referrals — Partner-Referrals. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: paypal-create-partner-referral
      description: Paypal Create partner referral
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: customer-partner-referrals-partner-referrals.partnerreferralscreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: paypal-show-referral-data
      description: Paypal Show referral data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: customer-partner-referrals-partner-referrals.partnerreferralsread
      outputParameters:
      - type: object
        mapping: $.
