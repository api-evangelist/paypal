      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payment-experience-web-profiles.webprofilegetlist
      outputParameters:
      - type: object
        mapping: $.
    - name: paypal-update-web-experience-profile
      description: Paypal Update web experience profile
      hints:
