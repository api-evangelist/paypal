naftiko: 1.0.0-alpha2
info:
  label: Paypal Transaction Search — Balances
  description: 'Paypal Transaction Search — Balances. 1 operations. Lead operation: Paypal List all balances. Self-contained
    Naftiko capability covering one Paypal business surface.'
  tags:
  - Paypal
  - Balances
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAYPAL_API_KEY: PAYPAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: reporting-transactions-balances
    baseUri: https://api-m.paypal.com/v1/reporting
    description: Paypal Transaction Search — Balances business capability. Self-contained, no shared references.
    resources:
    - name: v1-reporting-balances
      path: /v1/reporting/balances
      operations:
      - name: balancesget
        method: GET
        description: Paypal List all balances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PAYPAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: reporting-transactions-balances-rest
    port: 8080
    description: REST adapter for Paypal Transaction Search — Balances. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/reporting/balances
      name: v1-reporting-balances
      description: REST surface for v1-reporting-balances.
      operations:
      - method: GET
        name: balancesget
        description: Paypal List all balances
        call: reporting-transactions-balances.balancesget
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reporting-transactions-balances-mcp
    port: 9090
    transport: http
    description: MCP adapter for Paypal Transaction Search — Balances. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: paypal-list-all-balances
      description: Paypal List all balances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reporting-transactions-balances.balancesget
      outputParameters:
      - type: object
        mapping: $.
